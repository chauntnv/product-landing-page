<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Product Landing Page</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <nav class="navbar" id="mainNav">
      <a class="navbar-brand" href="index.html">PlayStation 5</a>
      <button class="hamburger" aria-label="Toggle navigation">
        <span></span><span></span><span></span>
      </button>
      <ul class="nav-links" id="navLinks">
        <li><a href="#home" class="active">Home</a></li>
        <li><a href="#feature">Feature</a></li>
        <li><a href="#contact">Contact</a></li>
      </ul>
    </nav>

    <header class="hero" id="home">
      <div class="hero-inner">
        <div class="hero-content">
          <h1>Next-gen gaming for your everyday play</h1>
          <p>
            Experience lightning-fast performance, immersive visuals, and
            revolutionary gameplay with the PlayStation 5.
          </p>
          <a href="#" class="btn-buy">Buy now</a>
        </div>

        <div class="hero-image">
          <img src="assets/hero_product.png" alt="Ps5 image" />
        </div>
      </div>

      <div class="hero-shape-bottom">
        <img src="assets/hero_bg.png" alt="" aria-hidden="true" />
        <svg viewBox="0 0 1440 80" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M0,40 C180,80 360,0 540,40 C720,80 900,0 1080,40 C1260,80 1440,20 1440,40 L1440,80 L0,80 Z" fill="#ffffff" />
        </svg>
